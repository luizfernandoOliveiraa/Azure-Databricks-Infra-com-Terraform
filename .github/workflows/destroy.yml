name: 'Terraform Destroy / Cleanup'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Qual ambiente destruir?'
        required: true
        type: choice
        options:
          - dev
          - prod
          - all

jobs:
  terraform-destroy-dev:
    name: 'Destroy DEV Environment'
    if: inputs.environment == 'dev' || inputs.environment == 'all'
    runs-on: ubuntu-latest
    
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    defaults:
      run:
        working-directory: ./dev

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy (DEV)
      run: terraform destroy -auto-approve

  terraform-destroy-prod:
    name: 'Destroy PROD Environment'
    if: inputs.environment == 'prod' || inputs.environment == 'all'
    runs-on: ubuntu-latest
    
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    defaults:
      run:
        working-directory: ./prod

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy (PROD)
      run: terraform destroy -auto-approve
